services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
    env_file:
      - .env
    environment:
      ADK_BASE_URL: ${ADK_BASE_URL:-http://adk-api:8001}
    ports:
      - "${HOST_PORT:-8010}:${UVICORN_PORT:-8000}"
    command: sh -lc "uvicorn app.main:app --reload --host $${UVICORN_HOST:-0.0.0.0} --port $${UVICORN_PORT:-8000}"
    networks:
      - adk_shared_net

networks:
  adk_shared_net:
    external: true
