services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
    env_file:
      - .env
    ports:
      - "${UVICORN_PORT:-8000}:8000"
    command: sh -lc "uvicorn app.main:app --reload --host $${UVICORN_HOST:-0.0.0.0} --port $${UVICORN_PORT:-8000}"
